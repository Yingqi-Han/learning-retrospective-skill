name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # 3.8 is the code floor (stdlib-only, no syntax beyond walrus), but
        # EOL interpreters and retired runner images (ubuntu-22.04) are not
        # worth CI flakiness; the tested floor is 3.10.
        python-version: ["3.10", "3.12", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Complete test suite
        run: python -S -m unittest discover -s learning-retrospective/tests -v
      - name: Installer end-to-end (project target)
        run: |
          python install.py --agent project --target ./tmp-skills
          python install.py --agent project --target ./tmp-skills --dry-run --skip-tests
          python install.py --agent project --target ./tmp-skills --force --skip-tests --locale zh-CN
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("tmp-skills/learning-retrospective/SKILL.md")
          text = path.read_text(encoding="ascii")
          line = next(line for line in text.splitlines() if line.startswith("description:"))
          localized_description = json.loads(line.split(":", 1)[1].strip())
          assert chr(0x590D) + chr(0x76D8) in localized_description
          PY
          test ! -d ./tmp-skills/learning-retrospective.bak-*
          test -d ./.tmp-skills-backups
          python install.py --agent project --target ./tmp-skills --uninstall
          rm -rf ./.tmp-skills-backups
        shell: bash
      - name: Installer prints hook config without writing
        run: python install.py --agent claude --print-hook-config
      - name: Transactional Codex hook bundle install
        env:
          HOME: ${{ runner.temp }}/lr-home
          USERPROFILE: ${{ runner.temp }}/lr-home
        run: |
          python install.py --agent codex --with-hooks --skip-tests
          python -c "from pathlib import Path; h=Path.home()/'.codex'/'hooks'; assert (h/'retry-loop-detector-codex.py').is_file(); assert (h/'retry-reviewer-codex-cli.py').is_file(); assert (h/'learning-retrospective-reviewer.json').is_file()"
          python -c "import subprocess,sys; out=subprocess.check_output([sys.executable,'install.py','--agent','codex','--print-hook-config'],text=True); assert '\"timeout\": 60' in out"
          python install.py --agent codex --uninstall
